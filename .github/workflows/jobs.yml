name: DevOps Job Radar

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests openpyxl

      - name: Run scraper
        run: python scraper.py

      - name: Commit results
        run: |
          git config --global user.name "github-bot"
          git config --global user.email "bot@github.com"
          git add devops_jobs.xlsx
          git commit -m "Update job list" || echo "No changes"
          git push
